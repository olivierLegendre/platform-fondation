version: 1
owner: platform-foundation
purpose: Runtime secret contract for Wave 6 (Vault bootstrap baseline)

services:
  automation-scenario-service:
    env_prefix: AUTOMATION_SCENARIO_
    required:
      - AUTH_JWT_SECRET
      - AUTH_JWT_ISSUER
      - AUTH_JWT_AUDIENCE
    optional: []

  channel-policy-router:
    env_prefix: CHANNEL_POLICY_ROUTER_
    required:
      - AUTH_JWT_SECRET
      - AUTH_JWT_ISSUER
      - AUTH_JWT_AUDIENCE
    optional: []

notes:
  - Non-dev runtimes must not use default development JWT secrets.
  - Secret values are sourced from Vault and injected at runtime.
  - This contract defines names only; values must never be committed.
