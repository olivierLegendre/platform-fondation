services:
  postgres-shared:
    image: postgres:18
    container_name: platform-foundation-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_SUPERUSER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    ports:
      - "${POSTGRES_CLUSTER_PORT:-55440}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_SUPERUSER:-postgres} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
    external: true
    name: ${POSTGRES_MANAGED_VOLUME_NAME:-pf_postgres_data_managed}
