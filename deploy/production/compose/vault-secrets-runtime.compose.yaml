services:
  vault-agent-renderer:
    image: hashicorp/vault:1.18
    restart: unless-stopped
    environment:
      VAULT_ADDR: http://vault:8200
      APP_ENV: production

  runtime-secrets-validator:
    image: ghcr.io/olivierlegendre/runtime-secrets-validator:v0.1.0
    restart: "no"
    environment:
      APP_ENV: production
