services:
  channel-policy-router:
    image: ghcr.io/olivierlegendre/channel-policy-router:v0.2.0
    restart: unless-stopped
    environment:
      APP_ENV: production
      SERVICE_NAME: channel-policy-router
      CHANNEL_POLICY_ROUTER_PERSISTENCE_BACKEND: postgres
      CHANNEL_POLICY_ROUTER_POSTGRES_DSN: ${CHANNEL_POLICY_ROUTER_POSTGRES_DSN:?set via vault-rendered runtime env}
